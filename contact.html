<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact form for Daniel Githinji.">
    <title>Contact | Daniel Githinji</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="site-header">
        <div class="site-brand">
            <p class="eyebrow">Contact</p>
            <h1>Send a Message</h1>
            <p class="tagline">Use the form below if you want to collaborate, share feedback, or discuss a project.</p>
        </div>

        <nav class="site-nav" aria-label="Main Navigation">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="projects.html">Projects</a>
            <a href="contact.html" aria-current="page">Contact</a>
            <a href="semantic-conversion.html">Semantic Conversion</a>
        </nav>
    </header>

    <main>
        <section>
            <h2>Contact Form</h2>
            <form class="contact-form" action="#" method="post">
                <fieldset>
                    <legend>Personal Details</legend>
                    <div class="form-grid">
                        <div class="form-field">
                            <label for="name">Name</label>
                            <input id="name" name="name" type="text" autocomplete="name" required>
                        </div>
                        <div class="form-field">
                            <label for="email">Email</label>
                            <input id="email" name="email" type="email" autocomplete="email" required>
                        </div>
                        <div class="form-field">
                            <label for="phone">Phone</label>
                            <input id="phone" name="phone" type="tel" autocomplete="tel">
                        </div>
                        <div class="form-field">
                            <label for="subject">Subject</label>
                            <input id="subject" name="subject" type="text" required>
                        </div>
                    </div>
                </fieldset>

                <fieldset>
                    <legend>Message</legend>
                    <div class="form-field">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="6" required></textarea>
                    </div>
                    <label class="check-row" for="updates">
                        <input id="updates" name="updates" type="checkbox">
                        <span>I agree to receive follow-up messages about this inquiry.</span>
                    </label>
                </fieldset>

                <div class="contact-actions">
                    <button type="submit">Submit</button>
                    <p class="report-meta">I usually respond with email first, then phone if needed.</p>
                </div>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Daniel Githinji.</p>
    </footer>
</body>
</html>
